name: city_noise
channels:
  - conda-forge
  - defaults

dependencies:

  # Python
  - python=3.12

  # Ciência de Dados
  - numpy
  - pandas
  - scipy

  # Visualização
  - matplotlib
  - plotly

  # Machine Learning
  - scikit-learn
  - xgboost

  # Geoprocessamento
  - geopandas
  - shapely
  - pyproj
  - fiona
  - rasterio

  # Banco de Dados
  - sqlalchemy
  - sqlite

  # Arquivos e APIs
  - requests
  - openpyxl

  # Notebooks
  - jupyterlab

  # Utilidades
  - tqdm

  # Pip
  - pip

  - pip:

      # Dashboard
      - streamlit

      # Mapas
      - folium
      - streamlit-folium

      # Geocodificação
      - geopy

      # Estatísticas
      - statsmodels

      # Explainable AI
      - shap

      # Validação de dados
      - pydantic

      # Configuração
      - python-dotenv

      # Gráficos avançados
      - altair
